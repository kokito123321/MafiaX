kind = "mobile"
previewPath = "/"
title = "Mafia X"
version = "1.0.0"
id = "artifacts/mafia-x"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21602

[services.development]
run = "pnpm --filter @workspace/mafia-x run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mafia-x", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mafia-x", "run", "serve" ]

[services.env]
PORT = "21602"
BASE_PATH = "/"
